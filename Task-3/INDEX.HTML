<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="STYLE.CSS">

</head>
<body>
    <main>

        <div class="container">
            <input type = "text" id="input">


            <table>
                <tr>
                    <td><button class="btn" onclick="btnPercent()">%</button></td>
                    <td><button class="btn" onclick="btn1sqrt()">SQRT</button></td>
                    <td><button class="btn" onclick="btnDel()">CE</button></td>
                    <td><button class="btn" onclick="btnclear()">C</button></td>
                </tr>
                <tr>
                    <td><button class="btn" onclick="btn7()">7</button></td>
                    <td><button class="btn" onclick="btn8()">8</button></td>
                    <td><button class="btn" onclick="btn9()">9</button></td>
                    <td><button class="btn" onclick="btnMinus()">-</button></td>
                </tr>
                <tr>
                    <td><button class="btn" onclick="btn4()">4</button></td>
                    <td><button class="btn" onclick="btn5()">5</button></td>
                    <td><button class="btn" onclick="btn6()">6</button></td>
                    <td><button class="btn" onclick="btnDivide()">/</button></td>
                </tr>
                <tr>
                    <td><button class="btn" onclick="btn1()">1</button></td>
                    <td><button class="btn" onclick="btn2()">2</button></td>
                    <td><button class="btn" onclick="btn3()">3</button></td>
                    <td><button class="btn" onclick="btnMultiply()">*</button></td>
                </tr>
                <tr>
                    <td><button class="btn" onclick="btnDot()">.</button></td>
                    <td><button class="btn" onclick="btn0()">0</button></td>
                    <td><button class="btn" onclick="btnEqual()">=</button></td>
                    <td><button class="btn" onclick="btnPlus()">+</button></td>
                </tr>
            </table>

        </div>

    </main>

<iframe src="https://maps.google.com/maps?q=Detroit&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>





  <script src="script.js"></script>  
</body>
</html>
